services:
  vad-proxy:
    build: .
    container_name: vad-proxy
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      VAD_PROXY_LOG_DIR: /app/logs
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
