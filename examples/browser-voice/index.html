<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vad-proxy browser voice demo</title>
  <style>
    :root { font-family: system-ui, sans-serif; color-scheme: light dark; }
    body { max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    input, button, textarea { width: 100%; box-sizing: border-box; margin-top: 0.35rem; }
    button { width: auto; padding: 0.5rem 1rem; cursor: pointer; }
    #log { white-space: pre-wrap; background: #111; color: #0f0; padding: 1rem; min-height: 12rem; border-radius: 6px; font-size: 0.9rem; }
    .row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>vad-proxy mic demo</h1>
  <p>
    Streams microphone audio to the GraphQL <code>/graphql</code> endpoint via
    <code>graphql-transport-ws</code>. Audio is downsampled to 16&nbsp;kHz mono
    Int16 PCM and sent as base64 <code>appendAudio</code> mutations.
  </p>

  <label for="url">WebSocket URL</label>
  <input id="url" value="ws://127.0.0.1:8080/graphql" />

  <div class="row">
    <button id="start">Start listening</button>
    <button id="stop" disabled>Stop</button>
    <button id="flush" disabled>End utterance</button>
  </div>

  <label for="log">Events</label>
  <textarea id="log" readonly rows="14"></textarea>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/graphql-ws@5.16.0/+esm";

    const $ = (id) => document.getElementById(id);
    const logEl = $("log");
    const append = (msg) => {
      logEl.value += msg + "\n";
      logEl.scrollTop = logEl.scrollHeight;
    };

    let client = null;
    let disposeSub = null;
    let sessionId = null;
    let mediaStream = null;
    let audioContext = null;
    let workletNode = null;
    let chunkTimer = null;
    let stopping = false;
    const pcmChunks = [];
    const filterStates = [{ z1: 0, z2: 0 }, { z1: 0, z2: 0 }];
    let inputRate = 0;

    const LISTEN_SUB = `subscription Listen {
      listen(sampleRate: 16000) {
        kind sessionId text turnComplete endPhrase startSecs endSecs sttBackend
      }
    }`;

    const appendMutation = (sid, b64) => ({
      query: `mutation Append($sessionId: ID!, $audio: String!) {
        appendAudio(sessionId: $sessionId, audioBase64: $audio)
      }`,
      variables: { sessionId: sid, audio: b64 },
    });

    const endUtteranceMutation = (sid) => ({
      query: `mutation End($sessionId: ID!) { endUtterance(sessionId: $sessionId) }`,
      variables: { sessionId: sid },
    });

    const stopSessionMutation = (sid) => ({
      query: `mutation Stop($sessionId: ID!) { stopSession(sessionId: $sessionId) }`,
      variables: { sessionId: sid },
    });

    function floatToInt16(float32) {
      const out = new Int16Array(float32.length);
      for (let i = 0; i < float32.length; i++) {
        const s = Math.max(-1, Math.min(1, float32[i]));
        out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
      }
      return out;
    }

    function int16ToBase64(int16) {
      const bytes = new Uint8Array(int16.buffer, int16.byteOffset, int16.byteLength);
      let binary = "";
      for (let i = 0; i < bytes.length; i += 8192) {
        binary += String.fromCharCode(...bytes.subarray(i, i + 8192));
      }
      return btoa(binary);
    }

    function lowpassBiquadCoeffs(sampleRate, cutoffHz) {
      const q = Math.SQRT1_2;
      const w0 = (2 * Math.PI * cutoffHz) / sampleRate;
      const cos = Math.cos(w0);
      const sin = Math.sin(w0);
      const alpha = sin / (2 * q);
      const b0 = (1 - cos) / 2;
      const b1 = 1 - cos;
      const b2 = (1 - cos) / 2;
      const a0 = 1 + alpha;
      const a1 = -2 * cos;
      const a2 = 1 - alpha;
      return {
        b0: b0 / a0, b1: b1 / a0, b2: b2 / a0, a1: a1 / a0, a2: a2 / a0,
      };
    }

    function applyBiquad(input, coeffs, state) {
      const out = new Float32Array(input.length);
      let z1 = state?.z1 ?? 0, z2 = state?.z2 ?? 0;
      for (let i = 0; i < input.length; i++) {
        const x = input[i];
        const y = coeffs.b0 * x + z1;
        z1 = coeffs.b1 * x - coeffs.a1 * y + z2;
        z2 = coeffs.b2 * x - coeffs.a2 * y;
        out[i] = y;
      }
      if (state) {
        state.z1 = z1;
        state.z2 = z2;
      }
      return out;
    }

    function downsample(buffer, fromRate, toRate, states) {
      if (fromRate === toRate) return buffer;
      const nyquist = toRate / 2;
      const cutoff = Math.min(fromRate / 2, nyquist) * 0.95;
      const coeffs = lowpassBiquadCoeffs(fromRate, cutoff);
      let filtered = buffer;
      for (let s = 0; s < 2; s++) {
        filtered = applyBiquad(filtered, coeffs, states?.[s]);
      }
      const ratio = fromRate / toRate;
      const outLen = Math.floor(filtered.length / ratio);
      const out = new Float32Array(outLen);
      for (let i = 0; i < outLen; i++) {
        const idx = i * ratio;
        const i0 = Math.floor(idx);
        const i1 = Math.min(i0 + 1, filtered.length - 1);
        const frac = idx - i0;
        out[i] = filtered[i0] * (1 - frac) + filtered[i1] * frac;
      }
      return out;
    }

    const PCM_WORKLET_CODE = `
      class PcmCaptureProcessor extends AudioWorkletProcessor {
        process(inputs) {
          const channel = inputs[0]?.[0];
          if (channel?.length) this.port.postMessage(channel.slice(0));
          return true;
        }
      }
      registerProcessor("pcm-capture-processor", PcmCaptureProcessor);
    `;

    async function startMic() {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true },
        video: false,
      });
      audioContext = new AudioContext();
      await audioContext.resume();
      const workletUrl = URL.createObjectURL(
        new Blob([PCM_WORKLET_CODE], { type: "application/javascript" }),
      );
      await audioContext.audioWorklet.addModule(workletUrl);
      URL.revokeObjectURL(workletUrl);

      const source = audioContext.createMediaStreamSource(mediaStream);
      const worklet = new AudioWorkletNode(audioContext, "pcm-capture-processor");
      inputRate = audioContext.sampleRate;
      worklet.port.onmessage = (e) => {
        if (stopping) return;
        const samples = e.data;
        if (!samples?.length) return;
        pcmChunks.push(samples);
      };
      const silent = audioContext.createGain();
      silent.gain.value = 0;
      source.connect(worklet);
      worklet.connect(silent);
      silent.connect(audioContext.destination);
      workletNode = worklet;
      chunkTimer = setTimeout(scheduleFlush, 200);
    }

    async function flushAudio() {
      if (!sessionId || !client || stopping || pcmChunks.length === 0) return;
      const total = pcmChunks.reduce((n, c) => n + c.length, 0);
      const merged = new Float32Array(total);
      let off = 0;
      for (const c of pcmChunks) {
        merged.set(c, off);
        off += c.length;
      }
      if (stopping) return;
      pcmChunks.length = 0;
      const b64 = int16ToBase64(floatToInt16(downsample(merged, inputRate, 16000, filterStates)));
      const { query, variables } = appendMutation(sessionId, b64);
      try {
        for await (const result of client.iterate({ query, variables })) {
          if (result?.data?.appendAudio === false) append("warning: audio chunk rejected (session ended)");
        }
      } catch (err) {
        append("appendAudio error: " + err);
      }
    }

    async function scheduleFlush() {
      if (stopping) return;
      await flushAudio();
      chunkTimer = setTimeout(scheduleFlush, 200);
    }

    async function stopMic() {
      stopping = true;
      clearTimeout(chunkTimer);
      chunkTimer = null;
      if (workletNode) {
        workletNode.disconnect();
        workletNode = null;
      }
      if (audioContext) {
        await audioContext.close();
        audioContext = null;
      }
      if (mediaStream) {
        mediaStream.getTracks().forEach((t) => t.stop());
        mediaStream = null;
      }
      pcmChunks.length = 0;
    }

    $("start").onclick = async () => {
      const url = $("url").value.trim();
      $("start").disabled = true;
      sessionId = null;
      logEl.value = "";

      client = createClient({
        url,
      });

      disposeSub = client.subscribe(
        { query: LISTEN_SUB },
        {
          next: (msg) => {
            const ev = msg.data?.listen;
            if (!ev) return;
            append(JSON.stringify(ev, null, 2));
            if (ev.kind === "session_started" && ev.sessionId) {
              sessionId = ev.sessionId;
              $("stop").disabled = false;
              $("flush").disabled = false;
            }
          },
          error: (err) => append("subscription error: " + err),
          complete: () => append("subscription complete"),
        }
      );

      try {
        await startMic();
        append("mic started — speak now");
      } catch (err) {
        append("mic error: " + err);
        $("start").disabled = false;
      }
    };

    $("flush").onclick = async () => {
      if (!sessionId || !client) return;
      try {
        for await (const _ of client.iterate(endUtteranceMutation(sessionId))) {}
      } catch (err) {
        append("endUtterance error: " + err);
      }
    };

    $("stop").onclick = async () => {
      $("stop").disabled = true;
      $("flush").disabled = true;
      await stopMic();
      if (sessionId && client) {
        try {
          for await (const _ of client.iterate(stopSessionMutation(sessionId))) {}
        } catch (_) {}
      }
      if (disposeSub) disposeSub();
      if (client) client.dispose();
      client = null;
      sessionId = null;
      $("start").disabled = false;
      append("stopped");
    };
  </script>
</body>
</html>
